    <style>
        :root {
            --bg-dark: #000000;
            --cream-white: #f5f5f0;
            --bronze-accent: rgba(166, 137, 102, 0.85);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--cream-white);
            font-family: 'EB Garamond', serif;
            margin: 0; padding: 5%;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 4rem; font-family: 'Montserrat', sans-serif;
        }

        .back-link { 
            text-decoration: none; color: var(--bronze-accent); 
            font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
        }

        h1 { font-weight: 400; font-size: 3rem; margin-bottom: 3rem; }
        h1 i { color: var(--bronze-accent); font-style: italic; }

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .job-card {
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2rem;
            transition: 0.4s;
            background: rgba(255,255,255,0.02);
        }

        .job-card:hover {
            border-color: var(--bronze-accent);
            background: rgba(166, 137, 102, 0.05);
        }

        .job-category { 
            font-family: 'Montserrat', sans-serif; font-size: 0.6rem; 
            letter-spacing: 2px; color: var(--bronze-accent); margin-bottom: 1rem;
        }

        .job-title { font-size: 1.5rem; margin-bottom: 1.5rem; }

        .apply-btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            border: 1px solid var(--bronze-accent);
            color: var(--cream-white);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem; letter-spacing: 1px;
        }
    </style>
</head>
