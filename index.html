<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pursu. | Talent Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,500;1,700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #000000;
            --cream-white: #f5f5f0;
            --bronze-accent: rgba(166, 137, 102, 0.85);
            --bronze-hover: rgba(186, 157, 122, 1);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }
        a, button, input, select { cursor: pointer; }

        body {
            background-color: var(--bg-dark);
            color: var(--cream-white);
            font-family: 'EB Garamond', serif; 
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* --- PRESTIGE OVERLAYS --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99; opacity: 0.05; pointer-events: none;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        #cursor-spotlight {
            position: fixed; top: 0; left: 0; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(166, 137, 102, 0.08) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 1; 
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2.5rem 10%; position: fixed; width: 100%;
            z-index: 100; font-family: 'Montserrat', sans-serif;
        }
        .logo-text { font-weight: 700; letter-spacing: 6px; font-size: 1.2rem; color: var(--bronze-accent); }
        .nav-links a {
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem; letter-spacing: 0.15rem; text-transform: uppercase;
            transition: 0.4s; margin-left: 3rem; font-weight: 700;
        }
        .nav-links a:hover { color: var(--bronze-accent); }

        /* --- HERO SECTION (ELEVATED) --- */
        .hero {
            height: 70vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            position: relative;
        }

        .logo-watermark {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(8rem, 25vw, 15rem);
            font-weight: 700; letter-spacing: -0.05em;
            background: linear-gradient(135deg, rgba(166, 137, 102, 0.2) 0%, rgba(255,255,255,0.01) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 2rem; /* Increased from -4rem to float higher */
            transform: translateY(-20px); /* Lifted up */
            animation: float 6s ease-in-out infinite;
        }

        /* --- SEARCH & FILTERS (UTILITY) --- */
        .search-area {
            width: 100%; max-width: 1100px; margin: -10vh auto 5vh auto;
            padding: 0 5%; z-index: 50; position: relative;
        }

        .search-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(166, 137, 102, 0.3);
            padding: 10px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 120px;
            gap: 10px;
        }

        input, select {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            color: var(--cream-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--bronze-accent); background: rgba(166, 137, 102, 0.05); }

        .search-btn {
            background: var(--bronze-accent);
            color: white; border: none; font-family: 'Montserrat', sans-serif;
            font-weight: 700; letter-spacing: 1px; transition: 0.4s;
        }
        .search-btn:hover { background: var(--bronze-hover); letter-spacing: 2px; }

        /* --- JOB BOARD (CLARITY) --- */
        .job-feed {
            width: 100%; max-width: 1100px; margin: 0 auto 150px auto;
            padding: 0 5%; display: flex; flex-direction: column; gap: 15px;
        }

        .job-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 2.5rem;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .job-card:hover {
            background: rgba(166, 137, 102, 0.03);
            border-color: var(--bronze-accent);
            transform: translateX(10px);
        }

        .job-main h2 {
            font-family: 'EB Garamond', serif;
            font-size: 1.8rem; font-weight: 400; color: var(--bronze-accent);
            margin-bottom: 8px;
        }

        .job-details {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
        }

        .job-details span { margin-right: 25px; }
        .job-details b { color: var(--cream-white); font-weight: 700; }

        .apply-link {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;
            color: var(--cream-white); text-decoration: none;
            padding: 12px 30px; border: 1px solid var(--bronze-accent);
            transition: 0.4s;
        }

        .apply-link:hover { background: var(--bronze-accent); color: white; }

        /* --- TICKER --- */
        .market-ticker {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(166, 137, 102, 0.2); padding: 15px 0; z-index: 110;
            font-family: 'Montserrat', sans-serif; font-size: 0.6rem;
            letter-spacing: 0.2rem; text-transform: uppercase; overflow: hidden; white-space: nowrap;
        }
        .ticker-content { display: inline-block; animation: tickerScroll 35s linear infinite; }
        .ticker-item { display: inline-block; margin-right: 5rem; color: rgba(255,255,255,0.4); }
        .ticker-item span { color: var(--bronze-accent); font-weight: 700; margin-right: 10px; }

        @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes float { 0%, 100% { transform: translateY(-20px); } 50% { transform: translateY(-40px); } }

        @media (max-width: 900px) {
            .search-box { grid-template-columns: 1fr; }
            .job-card { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-spotlight"></div>

    <nav>
        <div class="logo-text">PURSU.</div>
        <div class="nav-links">
            <a href="#">Talent</a>
            <a href="#">Employers</a>
            <a href="#">Our Testimony</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <div class="logo-watermark">Pursu.</div>
        <div style="z-index: 10; margin-top: -50px;">
            <span style="font-family: 'Montserrat'; font-size: 0.7rem; letter-spacing: 6px; text-transform: uppercase; color: var(--bronze-accent);">Talent Network</span>
            <h1 style="font-size: 3.5rem; font-weight: 400; margin-top: 10px;">The <i>Elite</i> Job Board</h1>
        </div>
    </section>

    <div class="search-area">
        <div class="search-box">
            <input type="text" placeholder="Keywords (e.g. Director, SaaS)">
            <select>
                <option>Specialization</option>
                <option>Finance</option>
                <option>Technology</option>
                <option>Creative</option>
            </select>
            <select>
                <option>Location</option>
                <option>Remote</option>
                <option>New York</option>
                <option>London</option>
            </select>
            <button class="search-btn">SEARCH</button>
        </div>
    </div>

    <section class="job-feed" id="feed">
        </section>

    <div class="market-ticker">
        <div class="ticker-content" id="ticker-box">
            <div class="ticker-item"><span>SYSTEM:</span> STREAMING LATEST OPPORTUNITIES...</div>
        </div>
    </div>

<script>
    const jobData = [
        { role: "Executive Director", type: "Full-Time", pay: "$180,000 - $220,000", loc: "New York / Hybrid", cat: "Leadership" },
        { role: "Senior Technical Architect", type: "Contract", pay: "$120 - $150 / hr", loc: "Remote", cat: "Technology" },
        { role: "VP of Product Marketing", type: "Full-Time", pay: "$165,000 - $195,000", loc: "Austin, TX", cat: "Marketing" },
        { role: "Lead Counsel", type: "Full-Time", pay: "$210,000+", loc: "San Francisco", cat: "Legal" }
    ];

    function initPortal() {
        const feed = document.getElementById('feed');
        feed.innerHTML = jobData.map(job => `
            <div class="job-card">
                <div class="job-main">
                    <div class="job-details"><span>${job.cat}</span> • <span>Posted 2h Ago</span></div>
                    <h2>${job.role}</h2>
                    <div class="job-details">
                        <b>${job.pay}</b> <span>${job.loc}</span> <span>[ ${job.type} ]</span>
                    </div>
                </div>
                <a href="#" class="apply-link">VIEW ROLE</a>
            </div>
        `).join('');

        const tickerBox = document.getElementById('ticker-box');
        tickerBox.innerHTML = [...jobData, ...jobData].map(j => `
            <div class="ticker-item"><span>ACTIVE:</span> ${j.role.toUpperCase()} | ${j.pay}</div>
        `).join('');
    }

    const spotlight = document.getElementById('cursor-spotlight');
    document.addEventListener('mousemove', (e) => {
        spotlight.style.left = e.clientX + 'px';
        spotlight.style.top = e.clientY + 'px';
    });

    window.onload = initPortal;
</script>
</body>
</html>
