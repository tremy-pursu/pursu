<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pursu. | Talent Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,500;1,700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #000000;
            --cream-white: #f5f5f0;
            --bronze-accent: rgba(166, 137, 102, 0.85);
            --bronze-hover: rgba(186, 157, 122, 1);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--cream-white);
            font-family: 'EB Garamond', serif; 
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* --- PRESTIGE OVERLAYS --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99; opacity: 0.05; pointer-events: none;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        #cursor-spotlight {
            position: fixed; top: 0; left: 0; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(166, 137, 102, 0.08) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 1; 
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2rem 5%; position: fixed; width: 100%;
            z-index: 100; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to bottom, black, transparent);
        }
        .logo-text { font-weight: 700; letter-spacing: 6px; font-size: 1.2rem; color: var(--bronze-accent); }
        .nav-links a {
            text-decoration: none; color: rgba(255, 255, 255, 0.6);
            font-size: 0.7rem; letter-spacing: 0.15rem; text-transform: uppercase;
            transition: 0.4s; margin-left: 2rem; font-weight: 700;
        }
        .nav-links a:hover { color: var(--bronze-accent); }

        /* --- SEARCH SECTION --- */
        .search-container {
            padding-top: 15vh;
            width: 80%;
            max-width: 1000px;
            margin: 0 auto 5vh auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            position: relative;
        }

        .search-bar {
            display: grid;
            grid-template-columns: 2fr 1fr 0.5fr;
            gap: 10px;
            background: var(--glass);
            padding: 10px;
            border: 1px solid rgba(166, 137, 102, 0.2);
            backdrop-filter: blur(10px);
        }

        input, select {
            background: transparent;
            border: none;
            padding: 15px;
            color: var(--cream-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            outline: none;
        }

        .search-btn {
            background: var(--bronze-accent);
            color: white;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-btn:hover { background: var(--bronze-hover); }

        /* --- JOB FEED --- */
        .job-grid {
            width: 80%;
            max-width: 1000px;
            margin: 0 auto 100px auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            z-index: 10;
            position: relative;
        }

        .job-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-card:hover {
            border-color: var(--bronze-accent);
            transform: translateY(-5px);
            background: rgba(166, 137, 102, 0.03);
        }

        .job-info h3 {
            font-size: 1.8rem;
            color: var(--bronze-accent);
            margin-bottom: 5px;
            font-weight: 400;
        }

        .job-meta {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
        }

        .job-meta span { margin-right: 20px; }
        .salary { color: var(--cream-white); font-weight: 700; }

        .view-job {
            padding: 12px 25px;
            border: 1px solid var(--bronze-accent);
            color: var(--bronze-accent);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            transition: 0.3s;
        }

        .view-job:hover {
            background: var(--bronze-accent);
            color: white;
        }

        /* --- TICKER --- */
        .market-ticker {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(166, 137, 102, 0.2); padding: 15px 0; z-index: 110;
            font-family: 'Montserrat', sans-serif; font-size: 0.6rem;
            letter-spacing: 0.2rem; text-transform: uppercase; overflow: hidden; white-space: nowrap;
        }
        .ticker-content { display: inline-block; animation: tickerScroll 30s linear infinite; }
        .ticker-item { display: inline-block; margin-right: 5rem; color: rgba(255,255,255,0.4); }
        .ticker-item span { color: var(--bronze-accent); font-weight: 700; margin-right: 10px; }

        @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        @media (max-width: 768px) {
            .search-bar { grid-template-columns: 1fr; }
            .job-card { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-spotlight"></div>

    <nav>
        <div class="logo-text">PURSU.</div>
        <div class="nav-links">
            <a href="#">Talent</a>
            <a href="#">Employers</a>
            <a href="#">Contact</a>
            <a href="#">Testimony</a>
        </div>
    </nav>

    <header class="search-container">
        <span style="font-family: 'Montserrat'; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--bronze-accent);">Exclusive Opportunities</span>
        <h1 style="font-size: 3rem; font-weight: 400; margin-top: -10px;">Find your <i>Next Pursuit.</i></h1>
        
        <div class="search-bar">
            <input type="text" placeholder="Job Title, Skills, or Keywords">
            <select>
                <option>All Locations</option>
                <option>Remote</option>
                <option>New York, NY</option>
                <option>London, UK</option>
            </select>
            <button class="search-btn">SEARCH</button>
        </div>
    </header>

    <section class="job-grid" id="job-feed">
        </section>

    <div class="market-ticker">
        <div class="ticker-content" id="ticker-box">
            <div class="ticker-item"><span>SYSTEM:</span> STREAMING LATEST OPPORTUNITIES...</div>
        </div>
    </div>

<script>
    // Expanded data to mimic Robert Half style
    const jobs = [
        { title: "Executive Director", loc: "New York / Remote", salary: "$180k - $220k", industry: "Finance", posted: "2h ago" },
        { title: "VP of Engineering", loc: "San Francisco", salary: "$250k - $310k", industry: "Tech", posted: "5h ago" },
        { title: "Senior Legal Counsel", loc: "London", salary: "£140k - £170k", industry: "Legal", posted: "1d ago" },
        { title: "Head of Operations", loc: "Hybrid", salary: "$160k - $190k", industry: "Logistics", posted: "3h ago" }
    ];

    function renderJobs() {
        const feed = document.getElementById('job-feed');
        feed.innerHTML = jobs.map(job => `
            <div class="job-card">
                <div class="job-info">
                    <div class="job-meta"><span>${job.industry}</span> • <span>${job.posted}</span></div>
                    <h3>${job.title}</h3>
                    <div class="job-meta"><span class="salary">${job.salary}</span> <span>${job.loc}</span></div>
                </div>
                <a href="#" class="view-job">VIEW DETAILS</a>
            </div>
        `).join('');

        // Also update ticker
        const tickerBox = document.getElementById('ticker-box');
        const tickerItems = [...jobs, ...jobs].map(j => `
            <div class="ticker-item"><span>ACTIVE:</span> ${j.title.toUpperCase()} [${j.salary}]</div>
        `).join('');
        tickerBox.innerHTML = tickerItems;
    }

    // Cursor Spotlight
    const spotlight = document.getElementById('cursor-spotlight');
    document.addEventListener('mousemove', (e) => {
        spotlight.style.left = e.clientX + 'px';
        spotlight.style.top = e.clientY + 'px';
    });

    window.onload = renderJobs;
</script>
</body>
</html>
