<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pursu. | Pursuing the Perfect Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,500;1,700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #000000;
            --cream-white: #f5f5f0;
            --bronze-accent: rgba(166, 137, 102, 0.85);
            --bronze-hover: rgba(186, 157, 122, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }
        a, button { cursor: pointer; }

        body {
            background-color: var(--bg-dark);
            color: var(--cream-white);
            font-family: 'EB Garamond', serif; 
            overflow: hidden;
            line-height: 1.2;
        }

        /* --- PRESTIGE OVERLAYS --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99; opacity: 0.05; pointer-events: none;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        #cursor-spotlight {
            position: fixed; top: 0; left: 0; width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(166, 137, 102, 0.12) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 1; 
        }

        /* --- INTRO OVERLAY --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #000000; display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.5s ease, filter 1.5s ease;
        }
        .melting-logo { width: 180px; mix-blend-mode: screen; filter: contrast(1.2) brightness(1.1); }
        .melt-away { filter: blur(35px) opacity(0); pointer-events: none; }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2.5rem 10%; position: absolute; width: 100%;
            z-index: 10; font-family: 'Montserrat', sans-serif;
        }
        .logo-text { font-weight: 700; letter-spacing: 6px; font-size: 1.2rem; color: var(--bronze-accent); }
        .nav-links a {
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem; letter-spacing: 0.15rem; text-transform: uppercase;
            transition: 0.4s; margin-left: 3rem; font-weight: 700;
        }
        .nav-links a:hover { color: var(--bronze-accent); }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .logo-watermark {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(8rem, 25vw, 15rem);
            font-weight: 700; letter-spacing: -0.05em;
            background: linear-gradient(135deg, rgba(166, 137, 102, 0.25) 0%, rgba(255,255,255,0.02) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; margin-bottom: -4rem; transform: translateY(30px);
            transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: float 6s ease-in-out infinite;
        }

        #home-page-content { opacity: 0; transform: translateY(20px); transition: all 1.5s ease 0.3s; }
        .sub-head {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5rem;
            color: rgba(255,255,255,0.5); display: block; margin-bottom: 1rem;
            font-family: 'Montserrat', sans-serif;
        }
        .main-head { font-weight: 400; font-size: clamp(2rem, 7vw, 3.5rem); line-height: 1.1; margin-bottom: 3.5rem; }
        .main-head i { font-style: italic; font-weight: 500; color: var(--bronze-accent); }

        .cta-button {
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            background: var(--bronze-accent); backdrop-filter: blur(10px);
            color: #fff; padding: 1.4rem 4rem; text-decoration: none;
            font-size: 0.8rem; letter-spacing: 0.2rem; border: 1px solid rgba(255, 255, 255, 0.15);
            opacity: 0; transform: translateY(10px); transition: all 1s ease 0.6s;
        }
        .cta-button:hover { background: var(--bronze-hover); transform: translateY(-5px) !important; transition: 0.4s; }

        /* --- LIVE MARKET TICKER --- */
        .market-ticker {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(166, 137, 102, 0.2); padding: 15px 0; z-index: 50;
            font-family: 'Montserrat', sans-serif; font-size: 0.6rem;
            letter-spacing: 0.2rem; text-transform: uppercase; overflow: hidden; white-space: nowrap;
        }
        .ticker-content { 
            display: inline-block; 
            animation: tickerScroll 25s linear infinite;
        }
        .ticker-item { display: inline-block; margin-right: 5rem; color: rgba(255,255,255,0.4); }
        .ticker-item span { color: var(--bronze-accent); font-weight: 700; margin-right: 10px; }

        @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .reveal { opacity: 0.7 !important; transform: translateY(0) !important; }
        .reveal-full { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-spotlight"></div>

    <div id="intro-overlay">
        <img src="logo.png" alt="Pursu Logo" class="melting-logo">
    </div>

    <nav>
        <div class="logo-text">PURSU.</div>
        <div class="nav-links">
            <a href="#">Talent</a>
            <a href="#">Employers</a>
            <a href="#">Contact</a>
            <a href="#">Our Testimony</a>
        </div>
    </nav>

    <section class="hero">
        <div class="logo-watermark" id="wm">Pursu.</div>
        <div id="home-page-content">
            <span class="sub-head">Recruitment Redefined</span>
            <h1 class="main-head">Pursuing the<br><i>Perfect Match</i></h1>
            <a href="#" class="cta-button" id="btn">EXPLORE OPPORTUNITIES</a>
        </div>
    </section>

    <div class="market-ticker">
        <div class="ticker-content" id="ticker-box">
            <div class="ticker-item"><span>SYSTEM:</span> INITIALIZING SECURE FEED...</div>
        </div>
    </div>

<script>
    // Using your Published CSV link to ensure real-time data flow from Sheet1
    const G_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2qYZ17GlB-55wPZSRcX82Ap4WrrfUFcjw8YK7pyNgGFEm8P8dZK5qe-1ob01A9GhhJRa4luCTL1rj/pub?gid=0&single=true&output=csv';
    
    // High-end fallback list
    const fallbackJobs = ["Executive Director", "Senior Technical Lead", "VP of Operations", "Head of Talent", "Chief of Staff"];

    async function fetchJobs() {
        try {
            // Fetch with cache-busting to get the latest sheet updates
            const response = await fetch(`${G_URL}&cb=${Date.now()}`);
            if (!response.ok) throw new Error("Sync Interrupted");
            
            const data = await response.text();
            
            // Parse CSV: removes quotes, trims whitespace, and skips empty rows
            const rows = data.split('\n')
                             .map(row => row.replace(/"/g, '').trim())
                             .filter(row => row.length > 2);
            
            if (rows.length > 0) {
                renderTicker(rows);
            } else {
                renderTicker(fallbackJobs);
            }
        } catch (e) {
            console.warn("Market sync paused. Reverting to internal pool.");
            renderTicker(fallbackJobs);
        }
    }

    function renderTicker(jobArray) {
        const tickerBox = document.getElementById('ticker-box');
        // Duplicate the list for a seamless infinite loop animation
        const items = [...jobArray, ...jobArray].map(job => `
            <div class="ticker-item"><span>ACTIVE:</span> ${job.toUpperCase()}</div>
        `).join('');
        tickerBox.innerHTML = items;
    }

    // Refresh the feed every 60 seconds
    setInterval(fetchJobs, 60000);

    // INTERACTIVE SPOTLIGHT (Cursor Effect)
    const spotlight = document.getElementById('cursor-spotlight');
    document.addEventListener('mousemove', (e) => {
        spotlight.style.left = e.clientX + 'px';
        spotlight.style.top = e.clientY + 'px';
    });

    // PAGE REVEAL SEQUENCE
    window.addEventListener('load', () => {
        fetchJobs(); // Initial fetch
        
        const overlay = document.getElementById('intro-overlay');
        const wm = document.getElementById('wm');
        const content = document.getElementById('home-page-content');
        const btn = document.getElementById('btn');

        setTimeout(() => {
            overlay.classList.add('melt-away');
            setTimeout(() => {
                wm.classList.add('reveal');
                content.classList.add('reveal-full');
                btn.classList.add('reveal-full');
            }, 800);
            setTimeout(() => { overlay.style.display = 'none'; }, 1500); 
        }, 1500);
    });
</script>
</body>
</html>
