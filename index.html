<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pursu. | Pursuing the Perfect Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,500;1,700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #000000;
            --cream-white: #f5f5f0;
            --bronze-accent: rgba(166, 137, 102, 0.85);
            --bronze-hover: rgba(186, 157, 122, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }
        a, button { cursor: pointer; }

        body {
            background-color: var(--bg-dark);
            color: var(--cream-white);
            font-family: 'EB Garamond', serif; 
            overflow: hidden;
            line-height: 1.2;
            height: 100vh;
        }

        /* --- PRESTIGE OVERLAYS --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99; opacity: 0.05; pointer-events: none;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        #cursor-spotlight {
            position: fixed; top: 0; left: 0; width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(166, 137, 102, 0.12) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 1; 
        }

        /* --- INTRO OVERLAY --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #000000; display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.5s ease, filter 1.5s ease;
        }
        .melting-logo { width: 180px; mix-blend-mode: screen; filter: contrast(1.2) brightness(1.1); }
        .melt-away { filter: blur(35px) opacity(0); pointer-events: none; }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2.5rem 10%; position: absolute; width: 100%;
            z-index: 100; font-family: 'Montserrat', sans-serif;
        }
        .logo-text { font-weight: 700; letter-spacing: 6px; font-size: 1.2rem; color: var(--bronze-accent); cursor: pointer; }
        .nav-links a {
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem; letter-spacing: 0.15rem; text-transform: uppercase;
            transition: 0.4s; margin-left: 3rem; font-weight: 700;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--bronze-accent); }

        /* --- CONTENT WRAPPERS --- */
        .content-section {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; opacity: 0; visibility: hidden; pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 5; padding: 0 10%;
        }
        .content-section.active { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0); }

        /* --- WATERMARK --- */
        .logo-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(8rem, 25vw, 15rem);
            font-weight: 700; letter-spacing: -0.05em;
            background: linear-gradient(135deg, rgba(166, 137, 102, 0.25) 0%, rgba(255,255,255,0.02) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            z-index: 2; pointer-events: none;
            opacity: 0; transition: opacity 1.5s ease;
        }

        /* --- HERO SECTION --- */
        .sub-head {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5rem;
            color: rgba(255,255,255,0.5); display: block; margin-bottom: 1rem;
            font-family: 'Montserrat', sans-serif;
        }
        .main-head { font-weight: 400; font-size: clamp(2rem, 7vw, 3.5rem); line-height: 1.1; margin-bottom: 3.5rem; }
        .main-head i { font-style: italic; font-weight: 500; color: var(--bronze-accent); }

        .cta-button {
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            background: var(--bronze-accent); backdrop-filter: blur(10px);
            color: #fff; padding: 1.4rem 4rem; text-decoration: none;
            font-size: 0.8rem; letter-spacing: 0.2rem; border: 1px solid rgba(255, 255, 255, 0.15);
            transition: 0.4s; display: inline-block;
        }
        .cta-button:hover { background: var(--bronze-hover); transform: translateY(-5px); }

        /* --- STACKED TALENT PAGE --- */
        #talent-page { justify-content: flex-start; padding-top: 15vh; overflow-y: auto; scrollbar-width: none; }
        #talent-page::-webkit-scrollbar { display: none; }
        
        .stack-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 40vh; padding-bottom: 20vh; }
        
        .opp-card {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(166, 137, 102, 0.1);
            padding: 4rem; min-height: 350px; width: 100%;
            position: sticky; top: 15vh;
            display: flex; flex-direction: column; justify-content: center; text-align: left;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.8);
            transition: border-color 0.4s;
        }
        .opp-card:hover { border-color: var(--bronze-accent); }
        .card-tag { font-family: 'Montserrat'; font-size: 0.6rem; color: var(--bronze-accent); letter-spacing: 3px; margin-bottom: 1.5rem; }

        /* --- TESTIMONY / ABOUT PAGE --- */
        .text-block { max-width: 800px; text-align: left; }
        .text-block p { font-size: 1.6rem; margin-bottom: 2rem; color: rgba(255,255,255,0.7); line-height: 1.4; }

        /* --- LIVE MARKET TICKER --- */
        .market-ticker {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(166, 137, 102, 0.2); padding: 15px 0; z-index: 150;
            font-family: 'Montserrat', sans-serif; font-size: 0.6rem;
            letter-spacing: 0.2rem; text-transform: uppercase; overflow: hidden; white-space: nowrap;
        }
        .ticker-content { display: inline-block; animation: tickerScroll 25s linear infinite; }
        .ticker-item { display: inline-block; margin-right: 5rem; color: rgba(255,255,255,0.4); }
        .ticker-item span { color: var(--bronze-accent); font-weight: 700; margin-right: 10px; }

        @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .reveal { opacity: 0.7 !important; }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-spotlight"></div>

    <div id="intro-overlay">
        <img src="logo.png" alt="Pursu Logo" class="melting-logo">
    </div>
