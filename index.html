<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pursu. | Pursuing the Perfect Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,500;1,700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #000000;
            --cream-white: #f5f5f0;
            --bronze-accent: rgba(166, 137, 102, 0.85);
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: var(--cream-white); font-family: 'EB Garamond', serif; overflow: hidden; width: 100vw; height: 100vh; }

        /* --- OVERLAYS --- */
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; opacity: 0.04; pointer-events: none; background: url('https://grainy-gradients.vercel.app/noise.svg'); }
        #cursor-spotlight { position: fixed; top: 0; left: 0; width: 500px; height: 500px; background: radial-gradient(circle, rgba(166, 137, 102, 0.08) 0%, transparent 70%); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 1; }

        /* --- SCREEN WRAPPER (The Slide Transition) --- */
        #main-wrapper {
            display: flex; width: 200vw; height: 100vh;
            transition: transform var(--transition);
            will-change: transform;
        }
        .screen { width: 100vw; height: 100vh; position: relative; overflow: hidden; flex-shrink: 0; }

        /* --- NAVIGATION --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 2.5rem 10%; position: absolute; width: 100%; z-index: 500; font-family: 'Montserrat', sans-serif; }
        .logo-text { font-weight: 700; letter-spacing: 6px; font-size: 1rem; color: var(--bronze-accent); }
        .nav-links a { text-decoration: none; color: rgba(255, 255, 255, 0.3); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; margin-left: 2rem; transition: 0.4s; font-weight: 700; }
        .nav-links a:hover { color: var(--bronze-accent); }

        /* --- HERO SCREEN --- */
        .hero { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .logo-watermark { font-family: 'Montserrat', sans-serif; font-size: clamp(5rem, 25vw, 18rem); font-weight: 700; background: linear-gradient(135deg, rgba(166, 137, 102, 0.2), rgba(255,255,255,0.01)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: float 6s ease-in-out infinite; transform: translateZ(0); }
        #home-content { opacity: 0; transform: translateY(20px); transition: 1.5s ease 0.5s; margin-top: -5rem; }
        .cta-button { margin-top: 3rem; font-family: 'Montserrat', sans-serif; border: 1px solid var(--bronze-accent); padding: 1.2rem 3rem; color: #fff; text-decoration: none; font-size: 0.7rem; letter-spacing: 3px; display: inline-block; transition: 0.5s; background: rgba(166,137,102,0.1); }
        .cta-button:hover { background: var(--bronze-accent); transform: translateY(-5px); }

        /* --- TALENT SCREEN (Stacked Layout) --- */
        #talent-screen { background: #050505; display: flex; flex-direction: column; padding: 10% 10% 5% 10%; }
        .back-btn { position: absolute; top: 2.5rem; left: 10%; font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 2px; color: var(--bronze-accent); cursor: pointer; }
        
        .stacked-container {
            flex: 1; display: flex; flex-direction: column;
            gap: 1.5rem; overflow-y: scroll; padding-right: 10px;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .stacked-container::-webkit-scrollbar { display: none; }

        .opportunity-card {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(166, 137, 102, 0.1);
            backdrop-filter: blur(20px);
            padding: 3.5rem; min-height: 280px;
            display: flex; flex-direction: column; justify-content: center;
            position: sticky; top: 20px; /* The "Stacking" effect */
            transition: transform 0.4s ease;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.5);
        }
        .opportunity-card:hover { border-color: var(--bronze-accent); z-index: 10; }
        
        .card-tag { font-family: 'Montserrat', sans-serif; font-size: 0.5rem; color: var(--bronze-accent); letter-spacing: 3px; margin-bottom: 1.5rem; border-left: 2px solid var(--bronze-accent); padding-left: 10px; }
        .card-title { font-size: 2rem; font-weight: 400; margin-bottom: 2rem; color: var(--cream-white); }
        .card-link { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 2px; color: #fff; text-decoration: none; border-bottom: 1px solid rgba(166,137,102,0.5); width: fit-content; padding-bottom: 5px; }

        /* --- TICKER --- */
        .ticker { position: fixed; bottom: 0; width: 100%; border-top: 1px solid rgba(166,137,102,0.2); background: #000; padding: 15px 0; z-index: 1000; overflow: hidden; display: flex; }
        .ticker-track { display: flex; white-space: nowrap; animation: scroll 40s linear infinite; }
        .ticker-item { padding: 0 3rem; font-family: 'Montserrat', sans-serif; font-size: 0.55rem; color: rgba(255,255,255,0.3); letter-spacing: 2px; }
        .ticker-item span { color: var(--bronze-accent); font-weight: 700; margin-right: 10px; }

        @keyframes scroll { from { transform: translate3d(0,0,0); } to { transform: translate3d(-50%,0,0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Active State Classes */
        .show-talent #main-wrapper { transform: translateX(-100vw); }
        .reveal-up { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

<div class="noise-overlay"></div>
<div id="cursor-spotlight"></div>

<nav>
    <div class="logo-text">PURSU.</div>
    <div class="nav-links">
        <a href="javascript:void(0)" onclick="goToTalent()">Talent</a>
        <a href="#">Employers</a>
        <a href="#">Contact</a>
    </div>
</nav>

<div id="main-wrapper">
    <section class="screen hero">
        <div class="logo-watermark">Pursu.</div>
        <div id="home-content">
            <span class="sub-head" style="letter-spacing: 5px; color: rgba(255,255,255,0.4); font-size: 0.7rem; font-family: 'Montserrat';">RECRUITMENT REDEFINED</span>
            <h1 class="main-head" style="font-size: clamp(2rem, 8vw, 4rem); font-weight: 400; margin-top: 1rem;">The Tier 1 <i>Matchmaker</i></h1>
            <a href="javascript:void(0)" onclick="goToTalent()" class="cta-button">VIEW MANDATES</a>
        </div>
    </section>

    <section class="screen" id="talent-screen">
        <div class="back-btn" onclick="goToHome()">[ BACK TO HOME ]</div>
        <div style="margin-bottom: 4rem;">
            <span class="sub-head" style="color: var(--bronze-accent); font-family: 'Montserrat'; letter-spacing: 4px; font-size: 0.6rem;">EXCELLENCE ONLY</span>
            <h2 style="font-size: 3rem; font-weight: 400; margin-top: 10px;">SWE <i>Opportunities</i></h2>
        </div>
        
        <div class="stacked-container" id="job-stack">
            </div>
    </section>
</div>

<div class="ticker" id="ticker-bar"></div>

<script>
    const G_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2qYZ17GlB-55wPZSRcX82Ap4WrrfUFcjw8YK7pyNgGFEm8P8dZK5qe-1ob01A9GhhJRa4luCTL1rj/pub?gid=0&single=true&output=csv';
    const fallback = ["Systems Architect", "HFT Engineer", "Lead SWE (FinTech)", "ML Infrastructure"];

    async function init() {
        try {
            const res = await fetch(`${G_URL}&cb=${Date.now()}`);
            const text = await res.text();
            const jobs = text.split('\n').map(r => r.replace(/"/g, '').trim()).filter(r => r.length > 2);
            render(jobs.length ? jobs : fallback);
        } catch { render(fallback); }
    }

    function render(jobs) {
        const stack = document.getElementById('job-stack');
        const ticker = document.getElementById('ticker-bar');

        stack.innerHTML = jobs.map((job, i) => `
            <div class="opportunity-card" style="margin-top: ${i * 40}px">
                <div class="card-tag">TOP 40 UNIVERSITY MANDATE</div>
                <h3 class="card-title">${job.toUpperCase()}</h3>
                <a href="mailto:pursu@pursu.com?subject=Enquiry: ${job}" class="card-link">ENQUIRE SECURELY</a>
            </div>
        `).join('');

        const tickerHtml = jobs.map(j => `<div class="ticker-item"><span>ACTIVE //</span> ${j.toUpperCase()}</div>`).join('');
        ticker.innerHTML = `<div class="ticker-track">${tickerHtml}${tickerHtml}</div>`;
    }

    function goToTalent() { document.body.classList.add('show-talent'); }
    function goToHome() { document.body.classList.remove('show-talent'); }

    // Spotlight movement
    const spotlight = document.getElementById('cursor-spotlight');
    document.addEventListener('mousemove', e => {
        spotlight.style.left = e.clientX + 'px';
        spotlight.style.top = e.clientY + 'px';
    });

    window.onload = () => {
        init();
        setTimeout(() => document.getElementById('home-content').classList.add('reveal-up'), 500);
    };
</script>

</body>
</html>
