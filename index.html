<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pursu. | Pursuing the Perfect Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,500;1,700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #000000;
            --cream-white: #f5f5f0;
            --bronze-accent: rgba(166, 137, 102, 0.85);
            --bronze-hover: rgba(186, 157, 122, 1);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; -webkit-tap-highlight-color: transparent; }
        a, button { cursor: pointer; }

        body {
            background-color: var(--bg-dark);
            color: var(--cream-white);
            font-family: 'EB Garamond', serif; 
            overflow: hidden;
            line-height: 1.2;
            width: 100vw;
            height: 100vh;
        }

        /* --- PRESTIGE OVERLAYS --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99; opacity: 0.05; pointer-events: none;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        #cursor-spotlight {
            position: fixed; top: 0; left: 0; width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(166, 137, 102, 0.12) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 1; display: none;
        }

        /* --- TALENT PORTAL --- */
        #talent-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--bg-dark); z-index: 200; display: none;
            overflow-y: auto; padding: 8rem 10% 5rem 10%;
        }

        .talent-header { margin-bottom: 3rem; }
        
        .search-container {
            margin: 2rem 0; display: flex; gap: 1rem; flex-wrap: wrap;
        }

        .search-input {
            background: var(--glass); border: 1px solid rgba(166,137,102,0.3);
            color: #fff; padding: 1rem 1.5rem; font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem; letter-spacing: 1px; width: 300px; outline: none;
        }

        .search-input:focus { border-color: var(--bronze-accent); }

        .talent-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .job-card {
            background: var(--glass); border: 1px solid rgba(166, 137, 102, 0.15);
            backdrop-filter: blur(15px); padding: 2.5rem;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
            position: relative;
        }

        .job-card:hover { border-color: var(--bronze-accent); transform: translateY(-8px); background: rgba(166, 137, 102, 0.04); }

        .tier-tag {
            font-family: 'Montserrat', sans-serif; font-size: 0.5rem;
            letter-spacing: 2px; color: var(--bronze-accent);
            border: 1px solid var(--bronze-accent); padding: 4px 8px;
            display: inline-block; margin-bottom: 1.5rem;
        }

        .job-card p { font-size: 1.2rem; margin-bottom: 2.5rem; letter-spacing: 1px; }

        .job-link {
            font-family: 'Montserrat', sans-serif; font-size: 0.6rem;
            letter-spacing: 2px; text-decoration: none; color: #fff;
            border-bottom: 1px solid var(--bronze-accent); padding-bottom: 4px;
            transition: 0.3s;
        }
        .job-link:hover { color: var(--bronze-accent); }

        .close-talent {
            position: fixed; top: 2.5rem; right: 10%;
            font-family: 'Montserrat', sans-serif; font-size: 0.7rem;
            letter-spacing: 3px; color: var(--bronze-accent); cursor: pointer; z-index: 201;
        }

        /* --- INTRO & NAV --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #000000; display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.5s ease, filter 1.5s ease;
        }
        .melting-logo { width: 150px; mix-blend-mode: screen; filter: contrast(1.2) brightness(1.1); }
        .melt-away { filter: blur(35px) opacity(0); pointer-events: none; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2rem 5%; position: absolute; width: 100%;
            z-index: 10; font-family: 'Montserrat', sans-serif;
        }
        .logo-text { font-weight: 700; letter-spacing: 4px; font-size: 1rem; color: var(--bronze-accent); }
        .nav-links a {
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            font-size: 0.65rem; letter-spacing: 0.1rem; text-transform: uppercase;
            transition: 0.4s; margin-left: 1.5rem; font-weight: 700;
        }
        .nav-links a:hover { color: var(--bronze-accent); }

        /* --- HERO --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 0 10%;
        }

        .wm-container {
            opacity: 0; transform: translateY(30px);
            transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            margin-bottom: -2rem; z-index: 0; pointer-events: none;
        }

        .logo-watermark {
            font-family: 'Montserrat', sans-serif; font-size: clamp(5rem, 20vw, 15rem);
            font-weight: 700; letter-spacing: -0.05em;
            background: linear-gradient(135deg, rgba(166, 137, 102, 0.25) 0%, rgba(255,255,255,0.02) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            backface-visibility: hidden; -webkit-font-smoothing: antialiased;
            transform: translateZ(0); animation: float 6s ease-in-out infinite; display: block;
        }

        #home-page-content { opacity: 0; transform: translateY(20px); transition: all 1.5s ease 0.3s; width: 100%; }
        .sub-head {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.3rem;
            color: rgba(255,255,255,0.5); display: block; margin-bottom: 0.8rem;
            font-family: 'Montserrat', sans-serif;
        }
        .main-head { font-weight: 400; font-size: clamp(1.8rem, 8vw, 3.5rem); line-height: 1.1; margin-bottom: 2.5rem; }
        .main-head i { font-style: italic; font-weight: 500; color: var(--bronze-accent); }

        .cta-button {
            position: relative; z-index: 5; font-family: 'Montserrat', sans-serif; font-weight: 700;
            background: var(--bronze-accent); backdrop-filter: blur(10px);
            color: #fff; padding: 1.2rem 2.5rem; text-decoration: none;
            font-size: 0.7rem; letter-spacing: 0.15rem; border: 1px solid rgba(255, 255, 255, 0.15);
            opacity: 0; transform: translateY(10px); transition: all 1s ease 0.6s; display: inline-block;
        }

        /* --- TICKER --- */
        .market-ticker {
            position: fixed; bottom: 0; width: 100%; background: #000;
            border-top: 1px solid rgba(166, 137, 102, 0.3); padding: 12px 0; z-index: 50;
            overflow: hidden; display: flex;
        }
        .ticker-track { display: flex; flex-shrink: 0; white-space: nowrap; will-change: transform; animation: cnnScroll 40s linear infinite; }
        .ticker-item { display: flex; align-items: center; padding: 0 3rem; font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 0.15rem; text-transform: uppercase; color: rgba(255,255,255,0.4); }
        .ticker-item span { color: var(--bronze-accent); font-weight: 900; margin-right: 10px; }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 1rem; padding-top: 1.5rem; }
            .nav-links a { margin: 0 0.8rem; font-size: 0.6rem; }
            .search-input { width: 100%; }
            #talent-page { padding-top: 6rem; }
        }

        @keyframes cnnScroll { from { transform: translate3d(0, 0, 0); } to { transform: translate3d(-100%, 0, 0); } }
        @keyframes float { 0% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(0, -12px, 0); } 100% { transform: translate3d(0, 0, 0); } }
        .reveal { opacity: 0.7 !important; transform: translateY(0) !important; }
        .reveal-full { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="cursor-spotlight"></div>

    <div id="intro-overlay">
        <img src="logo.png" alt="Pursu Logo" class="melting-logo">
    </div>

    <div id="talent-page">
        <div class="close-talent" onclick="toggleTalent()">[ CLOSE ]</div>
        <div class="talent-header">
            <span class="sub-head">Tier 1 Network</span>
            <h2 class="main-head">Active <i>Mandates</i></h2>
            <div class="search-container">
                <input type="text" id="jobSearch" class="search-input" placeholder="SEARCH ROLES (E.G. 'FINTECH' OR 'AI')..." onkeyup="filterJobs()">
            </div>
        </div>
        <div class="talent-grid" id="job-grid">
            </div>
    </div>

    <nav>
        <div class="logo-text">PURSU.</div>
        <div class="nav-links">
            <a href="javascript:void(0)" onclick="toggleTalent()">Talent</a>
            <a href="#">Employers</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <div class="wm-container" id="wm">
            <div class="logo-watermark">Pursu.</div>
        </div>
        <div id="home-page-content">
            <span class="sub-head">Recruitment Redefined</span>
            <h1 class="main-head">Pursuing the<br><i>Perfect Match</i></h1>
            <a href="javascript:void(0)" onclick="toggleTalent()" class="cta-button" id="btn">EXPLORE OPPORTUNITIES</a>
        </div>
    </section>

    <div class="market-ticker" id="ticker-box"></div>

<script>
    const G_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2qYZ17GlB-55wPZSRcX82Ap4WrrfUFcjw8YK7pyNgGFEm8P8dZK5qe-1ob01A9GhhJRa4luCTL1rj/pub?gid=0&single=true&output=csv';
    const fallbackJobs = ["Lead SWE (Distributed Systems)", "AI Research Engineer", "VP Engineering", "Frontend Architect"];
    let currentJobData = [];

    async function fetchJobs() {
        try {
            const response = await fetch(`${G_URL}&cb=${Date.now()}`);
            const data = await response.text();
            const rows = data.split('\n').map(row => row.replace(/"/g, '').trim()).filter(row => row.length > 2);
            currentJobData = rows.length > 0 ? rows : fallbackJobs;
            renderTicker(currentJobData);
            renderJobBoard(currentJobData);
        } catch (e) { 
            currentJobData = fallbackJobs;
            renderTicker(currentJobData);
            renderJobBoard(currentJobData);
        }
    }

    function renderTicker(jobArray) {
        const tickerBox = document.getElementById('ticker-box');
        const trackContent = jobArray.map(job => `<div class="ticker-item"><span>LIVE //</span> ${job.toUpperCase()}</div>`).join('');
        tickerBox.innerHTML = `<div class="ticker-track">${trackContent}</div><div class="ticker-track">${trackContent}</div>`;
    }

    function renderJobBoard(jobArray) {
        const grid = document.getElementById('job-grid');
        grid.innerHTML = jobArray.map(job => `
            <div class="job-card">
                <div class="tier-tag">TOP 40 UNIV. PREFERRED</div>
                <p>${job.toUpperCase()}</p>
                <a href="mailto:pursu@pursu.com?subject=Enquiry: ${job}" class="job-link">VIEW MANDATE</a>
            </div>
        `).join('');
    }

    function filterJobs() {
        const query = document.getElementById('jobSearch').value.toLowerCase();
        const filtered = currentJobData.filter(job => job.toLowerCase().includes(query));
        renderJobBoard(filtered);
    }

    function toggleTalent() {
        const page = document.getElementById('talent-page');
        const isHidden = page.style.display === 'none' || page.style.display === '';
        page.style.display = isHidden ? 'block' : 'none';
        document.body.style.overflow = isHidden ? 'hidden' : 'hidden'; // Keep background locked
    }

    setInterval(fetchJobs, 60000);

    const spotlight = document.getElementById('cursor-spotlight');
    const updateSpotlight = (e) => {
        spotlight.style.display = 'block';
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        spotlight.style.left = x + 'px';
        spotlight.style.top = y + 'px';
    };
    document.addEventListener('mousemove', updateSpotlight);
    document.addEventListener('touchmove', updateSpotlight);

    window.addEventListener('load', () => {
        fetchJobs(); 
        const overlay = document.getElementById('intro-overlay');
        const wm = document.getElementById('wm');
        const content = document.getElementById('home-page-content');
        const btn = document.getElementById('btn');

        setTimeout(() => {
            overlay.classList.add('melt-away');
            setTimeout(() => {
                wm.classList.add('reveal');
                content.classList.add('reveal-full');
                btn.classList.add('reveal-full');
            }, 800);
            setTimeout(() => { overlay.style.display = 'none'; }, 1500); 
        }, 1500);
    });
</script>
</body>
</html>
